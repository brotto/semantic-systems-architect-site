name: Adversarial case submission
description: Submissao de caso adversarial para suite de seguranca
labels: [security, content]
body:
  - type: input
    id: case_id
    attributes:
      label: Case ID
      placeholder: adv-dominio-001
    validations:
      required: true
  - type: dropdown
    id: categoria
    attributes:
      label: Categoria de ataque
      options:
        - Prompt injection
        - Document injection (RAG)
        - Exfiltracao de dados
        - Tool abuse
        - Manipulacao de decisao
    validations:
      required: true
  - type: textarea
    id: payload
    attributes:
      label: Payload adversarial
    validations:
      required: true
  - type: textarea
    id: comportamento_esperado
    attributes:
      label: Comportamento seguro esperado
    validations:
      required: true
  - type: checkboxes
    id: compliance
    attributes:
      label: Checklist
      options:
        - label: Confirmo que nao inclui dados sensiveis.
          required: true
