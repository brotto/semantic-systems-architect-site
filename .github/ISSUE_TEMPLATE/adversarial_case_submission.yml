name: Adversarial case submission
description: Submit a new adversarial case for the security suite
labels: [security, content]
body:
  - type: input
    id: case_id
    attributes:
      label: Case ID
      placeholder: adv-domain-001
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Attack category
      options:
        - Prompt injection
        - Document injection (RAG)
        - Data exfiltration
        - Tool abuse
        - Decision manipulation
    validations:
      required: true
  - type: textarea
    id: payload
    attributes:
      label: Adversarial payload
    validations:
      required: true
  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected secure behavior
    validations:
      required: true
  - type: checkboxes
    id: compliance
    attributes:
      label: Compliance checklist
      options:
        - label: I confirm this submission contains no sensitive data.
          required: true
