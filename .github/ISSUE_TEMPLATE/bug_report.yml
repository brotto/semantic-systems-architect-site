name: Bug report
description: Report issues in site behavior or content
labels: [bug]
body:
  - type: textarea
    id: issue
    attributes:
      label: What happened?
      description: Describe the observed problem.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: page
    attributes:
      label: Page/file
      placeholder: docs/trilha/...
  - type: textarea
    id: context
    attributes:
      label: Additional context
