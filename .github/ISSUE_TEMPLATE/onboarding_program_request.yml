name: Onboarding program request
description: Propose an SSA enterprise onboarding program for a specific organizational context
labels: [onboarding, enhancement]
body:
  - type: input
    id: unit
    attributes:
      label: Unit/company
      placeholder: e.g. Platform Squad, Business Unit X
    validations:
      required: true
  - type: textarea
    id: current_context
    attributes:
      label: Current context
      description: Current maturity, challenges, and objectives.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Desired scope
      description: Involved squads, timelines, and expected outcomes.
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: Main risks
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have identified both sponsor and technical owner.
          required: true
