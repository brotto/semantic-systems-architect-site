name: Feature request
description: Propose an improvement for the course, site, or community
labels: [enhancement]
body:
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should be added or improved?
    validations:
      required: true
  - type: textarea
    id: value
    attributes:
      label: Expected value
      description: What learning or community impact will this create?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Core Track
        - Labs
        - Templates
        - Certification
        - Site/UX
        - Governance
