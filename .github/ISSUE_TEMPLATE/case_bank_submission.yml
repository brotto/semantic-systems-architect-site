name: Case bank submission
description: Submit a new case to the community case bank
labels: [content, case-bank]
body:
  - type: input
    id: case_id
    attributes:
      label: Case ID
      placeholder: domain-topic-001
    validations:
      required: true
  - type: dropdown
    id: domain
    attributes:
      label: Domain
      options:
        - Health
        - Legal
        - B2B Support
        - Other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Case context
    validations:
      required: true
  - type: textarea
    id: expected_result
    attributes:
      label: Expected result
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Compliance
      options:
        - label: I confirm this submission contains no personal or sensitive data.
          required: true
