name: Capstone submission
description: Submit a capstone to the reference collection
labels: [content, capstone]
body:
  - type: input
    id: title
    attributes:
      label: Capstone title
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem solved
    validations:
      required: true
  - type: textarea
    id: architecture
    attributes:
      label: Architecture summary
    validations:
      required: true
  - type: textarea
    id: evals
    attributes:
      label: Evaluation evidence
      description: Include scores and key learnings.
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I attached or linked reproducible artifacts.
          required: true
        - label: I reviewed risks and mitigations.
          required: true
