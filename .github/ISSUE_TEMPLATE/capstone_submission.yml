name: Capstone submission
description: Submissao de capstone para colecao de referencia
labels: [content, capstone]
body:
  - type: input
    id: titulo
    attributes:
      label: Titulo do capstone
    validations:
      required: true
  - type: textarea
    id: problema
    attributes:
      label: Problema resolvido
    validations:
      required: true
  - type: textarea
    id: arquitetura
    attributes:
      label: Resumo da arquitetura
    validations:
      required: true
  - type: textarea
    id: evals
    attributes:
      label: Evidencias de evals
      description: Inclua scores e principais aprendizados.
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: Anexei ou linkei artefatos reproduziveis.
          required: true
        - label: Revisei riscos e mitigacoes.
          required: true
